<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E0FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FFA3;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#05070D"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#shieldGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Shield icon -->
  <path 
    d="M50 15 L75 25 L75 50 C75 70 50 85 50 85 C50 85 25 70 25 50 L25 25 Z" 
    fill="url(#shieldGradient)" 
    filter="url(#glow)"
  />
  
  <!-- Inner shield detail -->
  <path 
    d="M50 25 L65 32 L65 48 C65 62 50 72 50 72 C50 72 35 62 35 48 L35 32 Z" 
    fill="#05070D" 
    opacity="0.5"
  />
  
  <!-- Checkmark -->
  <path 
    d="M42 48 L48 54 L58 42" 
    fill="none" 
    stroke="#00FFA3" 
    stroke-width="4" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
</svg>
